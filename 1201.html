<!DOCTYPE html>
<html lang="zh-CN">
    <head>  
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>致王嘉恩的毕业信</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html, body{
                width: 100vw;
                height: 100vh;
                overflow-x: hidden;
                font-family: "Microsoft Yahei", sans-serif;
            }
            .page{
                scroll-snap-align: start;
                width: 100vw;
                height: 100vh;
                min-height: 100vh;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .page1{
                background: linear-gradient(135deg, #fef6e7, #f9e4d3, #f5d9c0);
            }
            .glass-card{
                width: 65vw;
                max-width: 700px;
                padding: 40px;
                backdrop-filter: blur(12px);
                background: rgba(255,255,255,0.25);
                border-radius: 16px;
                border: 1px solid rgba(255,255,255,0.4);
                opacity: 0;
                transform: scale(0.95);
                transition: all 0.8s ease;
            }
            .letter-pager{
                background: #fffdf8;
                padding: 50px 90px;
                border-radius: 8px;
                background-image: linear-gradient(#e9e2d7 1px, transparent 1px);
                background-size: 100% 36px;
                box-shadow: inset 0 0 0 1px #eee8df;
            }
            .letter-format{
                color: #4a3728;
                line-height: 36px;
                font-size: 18px;
            }
            .letter-format .title{
                font-size: 24px;
                text-align: center;
                margin-bottom: 30px;
                letter-spacing: 4px;
            }
            .letter-format .salute{
                text-indent: 0;
                margin-bottom: 12px;
            }
            .letter-format .para{
                text-indent: 2em;
                margin-bottom: 10px;
            }
            .letter-footer{
                margin-top: 40px;
                text-align: right;
                line-height: 2;
            }
            .page2{
                background: radial-gradient(circle at 20% 30%, #fff7e6, transparent 45%), radial-gradient(circle at 80% 70%, #ffebe0, transparent 45%), radial-gradient(circle at 50% 20%, #fcf0e3, transparent 50%);
            }
            .end-box{
                text-align: center; padding: 20px;
            }
            .big-cursive{
                font-family: "STXingkai", "华文行楷", cursive;
                font-size: clamp(32px, 7vw, 68px);
                color: #523c2e;
                letter-spacing: 6px;
                margin-bottom: 40px;
            }
            .big-cursive span{
                display: inline-block;
                opacity: 0;
                transform: translateX(-20px);
            }
            .sign-kai{
                font-family: "STKaiti", "华文楷体", serif;
                font-size: 22px;
                color: #664c3b;
            }
            #letterBox{
                display: none;
                width: 100vw;
                height: 100vh;
                scroll-snap-type: y mandatory;
                overflow-y: scroll;
                scroll-behavior: smooth;
            }
            @media screen and (max-width: 480px) {
                .glass-card{width: 92vw; padding: 16px;}
                .letter-pager{padding: 24px 16px;}
                .letter-format{padding: 14px; line-height: 28px;}
                .letter-format .title{font-size: 18px; margin-bottom: 18px; letter-spacing: 2px;}
                .letter-format .para{text-indent: 1.8em;}
                .letter-footer{margin-top: 24px;}
                .big-cursive{font-size: clamp(22px, 6vw, 32px); letter-spacing: 3px;}
                .sign-kai{font-size: 16px;}
                .page{padding: 10px;}
            }
            @media screen and (min-width:481px) and (max-width: 768px) {
                .glass-card{width: 85vw; padding: 24px;}
                .letter-pager{padding: 32px 28px;}
                .letter-format{padding: 16px; line-height: 32px;}
                .letter-format .title{font-size: 20px; letter-spacing: 3px;}
                .big-cursive{font-size: clamp(26px, 5.5vw, 42px);}
                .page{padding: 15px;}
            }
            @media screen and (min-width:769px) and (max-width: 1024px) {
                .glass-card{width: 75vw; max-width: 600px; padding: 32px;}
                .letter-pager{padding: 40px 50px;}
                .letter-format{padding: 17px; line-height: 34px;}
            }
            @media screen and (max-height: 500px) and (orientation: landscape) {
                .glass-card{width: 70vw; max-width: 560px; padding: 16px 24px;}
                .letter-pager{padding: 20px 30px;}
                .letter-format{padding: 13px; line-height: 24px;}
                .letter-format .title{font-size: 16px; margin-bottom: 12px;}
                .letter-format .para{margin-bottom: 4px;}
                .letter-footer{margin-top: 12px;}
                .big-cursive{font-size: clamp(18px, 4vw, 28px); margin-bottom: 16px;}
                .sign-kai{font-size: 14px;}
                .page{padding: 8px;}
            }
        </style>
    </head>
    <body>
        <div id="letterBox">
            <section class="page page1">
                <div class="glass-card">
                    <div class="letter-pager">
                        <div class="letter-format">
                            <p class="title">致王嘉恩的毕业信</p>
                            <p class="salute">嘉恩亲启：</p>
                            <p class="para">三年时光如白驹过隙，同窗共读的初中三年已悄然落幕。回望来时路，有汗水，有欢笑，有迷茫亦有成长。</p>
                            <p class="para">课堂上笔尖划过纸张，书声朗朗；夕阳下的操场被金色铺满；晚自修的教室里奋笔疾书……都是我们共同的记忆。</p>
                            <p class="para">我写过几份同学录，那么在这里我想写一下同学录中有一栏“你眼中的我”：</p>
                            <p class="para">我眼中的你活泼开朗，热爱体育运动，在篮球中有攻防意识，为人和善，既有认真也有抽象……无论性格如何，这些都是自己身上的闪光点！</p>
                            <p class="para">愿君顺遂！</p>
                            <div class="letter-footer">
                                <p>黄昊君</p>
                                <p>2026.07</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section class="page page2">
                <div class="end-box">
                    <h1 class="big-cursive" id="cursiveText">数载灯前磨剑，一朝路上乘风</h1>
                    <p class="sign-kai">——毕业留念</p>
                </div>
            </section>
        </div>
        <script>
            (function(){
                const letterBox = document.getElementById('letterBox');
                letterBox.style.display = 'block';
                initPageObservers();
                setTimeout(() => {
                    const firstPage = document.querySelector('.page1');
                    if (firstPage && !firstPage.dataset.animated){
                        triggerPage1Animation(firstPage);
                    }
                }, 300);
            })();
            function initPageObservers(){
                const pages = document.querySelectorAll('.page');
                const pageAnimations = {
                    page1: triggerPage1Animation,
                    page2: triggerPage2Animation
                };
                const observer = new IntersectionObserver((entries) =>{
                    entries.forEach(entry =>{
                        if (entry.isIntersecting){
                            const page =entry.target;
                            let id = '';
                            for (const cls of page.classList){
                                if (cls.startsWith('page') && cls !== 'page'){
                                    id = cls;
                                    break;
                                }
                            }
                            if (id && pageAnimations[id]){
                                pageAnimations[id](page);
                            }
                        }
                    });
                }, {
                    threshold: 0.1,
                    rootMargin: '0px 0px -20px 0px'
                });
                pages.forEach(page => observer.observe(page));
            }
            function triggerPage1Animation(page){
                if (page.dataset.animated) return;
                page.dataset.animated = 'true';
                const card = page.querySelector('.glass-card');
                if (card) {
                    setTimeout(() => {
                        card.style.opacity = '1';
                        card.style.transform = 'scale(1)';
                    }, 150);
                }
            }
            function triggerPage2Animation(page){
                if (page.dataset.animated) return;
                page.dataset.animated = 'true';
                const cursiveText = document.getElementById('cursiveText');
                const textContent = cursiveText.innerText;
                cursiveText.innerHTML = '';
                const charArr = [];
                for (let i = 0; i < textContent.length; i++){
                    const span = document.createElement('span');
                    span.innerText = textContent[i];
                    span.style.opacity = '0';
                    span.style.transform = 'translateX(-20px)';
                    span.style.display = 'inline-block';
                    cursiveText.appendChild(span);
                    charArr.push(span);
                }
                charArr.forEach((char, idx) => {
                    setTimeout(() => {
                        char.style.transition = 'all 0.4s ease-out';
                        char.style.opacity = '1';
                        char.style.transform = 'translateX(0)';
                    }, idx * 200);
                });
            }
        </script>
    </body>
</html>
